name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip -r "xtap-${VERSION}.zip" \
            manifest.json \
            manifest.firefox.json \
            background.js \
            content-main.js \
            content-bridge.js \
            popup.html popup.js popup.css \
            debug.html debug.js debug.css \
            icons/ \
            lib/ \
            native-host/xtap_core.py \
            native-host/xtap_host.py \
            native-host/xtap_daemon.py \
            native-host/com.xtap.host.json \
            native-host/com.xtap.host.firefox.json \
            native-host/com.xtap.daemon.plist \
            native-host/com.xtap.daemon.service \
            native-host/install.sh \
            native-host/install.ps1 \
            native-host/xtap_host.bat \
            native-host/xtap_daemon.bat

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="xtap-${VERSION}.zip#xTap ${VERSION} (extension + native host)"
          # Create the release if it doesn't exist yet (auto-generated notes
          # from commits since the previous tag), otherwise just upload the
          # zip into the release that was pre-created with hand-written notes.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              "$ASSET"
          fi
