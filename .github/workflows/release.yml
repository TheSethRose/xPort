name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip -r "xport-${VERSION}.zip" \
            extension/manifest.json \
            extension/background.js \
            extension/content-main.js \
            extension/content-bridge.js \
            extension/popup.html extension/popup.js extension/popup.css \
            extension/debug.html extension/debug.js extension/debug.css \
            extension/icons/ \
            extension/lib/ \
            native-host/xport_core.py \
            native-host/xport_host.py \
            native-host/xport_daemon.py \
            native-host/com.xport.host.json \
            native-host/com.xport.daemon.plist \
            native-host/com.xport.daemon.service \
            native-host/install.sh \
            native-host/install.ps1 \
            native-host/xport_host.bat \
            native-host/xport_daemon.bat

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="xport-${VERSION}.zip#XPort ${VERSION} (extension + native host)"
          # Create the release if it doesn't exist yet (auto-generated notes
          # from commits since the previous tag), otherwise just upload the
          # zip into the release that was pre-created with hand-written notes.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              "$ASSET"
          fi
