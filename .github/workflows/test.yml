name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install Python test dependencies
        run: pip install pytest pytest-cov -r requirements.txt

      - name: Run Python tests
        run: python3 -m pytest tests/ -v --cov --cov-report=xml:coverage-python.xml

      - name: Run JS tests with coverage
        run: npx c8 --reporter=lcov --report-dir=coverage-js node --test tests/*.test.mjs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          files: coverage-python.xml,coverage-js/lcov.info
