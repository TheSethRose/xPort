<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>XPort</h1>
      <div class="header-actions">
        <button id="open-settings" class="utility-btn icon-btn" type="button" aria-label="Open settings" title="Settings">
          <span data-icon="settings" aria-hidden="true"></span>
        </button>
        <span id="status-pill" class="status-pill">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="status-icon" aria-hidden="true"></span>
          <span id="status-label">Live</span>
        </span>
      </div>
    </header>
    <div id="transport-error" class="transport-error" style="display: none;"></div>
    <div id="system-state" class="system-state" aria-label="System state"></div>
    <div class="stats" aria-label="Tweet capture counts">
      <button id="session-card" class="stat" type="button" aria-label="Open dashboard for current session tweets">
        <span class="stat-icon" data-icon="message-square" aria-hidden="true"></span>
        <span class="stat-value" id="session-count">0</span>
        <span class="stat-label">Session Tweets</span>
      </button>
      <button id="alltime-card" class="stat" type="button" aria-label="Open dashboard for all captured tweets">
        <span class="stat-icon" data-icon="database" aria-hidden="true"></span>
        <span class="stat-value" id="alltime-count">0</span>
        <span class="stat-label">All-Time Tweets</span>
      </button>
      <button id="error-card" class="stat stat-error" type="button" aria-label="Open dashboard capture errors" style="display: none;">
        <span class="stat-icon" data-icon="triangle-alert" aria-hidden="true"></span>
        <span class="stat-value" id="error-count">0</span>
        <span class="stat-label">Errors</span>
      </button>
    </div>
    <button id="toggle" type="button"></button>
    <section class="recent-section" aria-labelledby="recent-title">
      <div class="section-heading">
        <h2 id="recent-title">Recent Tweets</h2>
        <button id="view-all-tweets" class="text-link" type="button" aria-label="View all captured tweets">
          <span data-icon="external-link" aria-hidden="true"></span>
          <span>View all</span>
        </button>
      </div>
      <div id="recent-tweets" class="recent-list"></div>
    </section>
    <div id="video-section" class="video-section" style="display: none;">
      <div class="video-info">
        <span id="video-label"></span>
      </div>
      <button id="transcribe-btn" class="download-btn" type="button">Transcribe Video</button>
    </div>
    <div class="nav-actions" aria-label="Dashboard links">
      <button id="open-tweets" class="dashboard-btn primary" type="button" aria-label="Open Tweet Dashboard">
        <span data-icon="message-square" aria-hidden="true"></span>
        <span>Open Tweet Dashboard</span>
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
